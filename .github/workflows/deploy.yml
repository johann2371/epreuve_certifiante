name: DIGITRANS-CM CI/CD Pipeline

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # ÉTAPE 1 : SECRET SCANNING (sur tous les événements)

  secret-scanning:
    name: 🔐 Secret Scanning (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

  # ─────────────────────────────────────────────────────────────────────────────
  # ÉTAPE 2 : BUILD, TEST & SCAN (sur tous les événements)
  # ─────────────────────────────────────────────────────────────────────────────
  build-test-scan:
    name: 🔨 Build, Test & Trivy Scan
    runs-on: ubuntu-latest
    needs: secret-scanning
    strategy:
      matrix:
        service: [erp-service, crm-service, supply-chain-service, bi-service, api-gateway]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests

      - name: Run Tests
        working-directory: ./${{ matrix.service }}
        run: mvn test

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './${{ matrix.service }}'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────────────────────────────────────────
  # ÉTAPE 3 : DEPLOY DEV (sur push vers la branche 'dev')
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy to DEV
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Deploy DEV
        working-directory: ./infrastructure/terraform
        run: |
          terraform init
          terraform apply -var-file="dev.tfvars" -auto-approve

  # ─────────────────────────────────────────────────────────────────────────────
  # ÉTAPE 4 : DEPLOY TEST / UAT (sur Pull Request vers 'main')
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-test:
    name: 🧪 Deploy to TEST (UAT)
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Deploy TEST
        working-directory: ./infrastructure/terraform
        run: |
          terraform init
          terraform apply -var-file="test.tfvars" -auto-approve

  # ─────────────────────────────────────────────────────────────────────────────
  # ÉTAPE 5 : DEPLOY PROD (sur push vers 'main' après merge)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: 🏭 Deploy to PROD
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Permet une validation manuelle sur GitHub
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Deploy PROD
        working-directory: ./infrastructure/terraform
        run: |
          terraform init
          terraform apply -var-file="prod.tfvars" -auto-approve
