name: DIGITRANS-CM CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ÉTAPE 1 : SECRET SCANNING (sur tous les événements)

  secret-scanning:
    name:  Secret Scanning (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

  # ÉTAPE 2 : BUILD, TEST & SCAN (sur tous les événements)

  build-test-scan:
    name:  Build, Test & Trivy Scan
    runs-on: ubuntu-latest
    needs: secret-scanning
    strategy:
      matrix:
        service: [erp-service, crm-service, supply-chain-service, bi-service, api-gateway]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests

      - name: Run Tests
        working-directory: ./${{ matrix.service }}
        run: mvn test

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './${{ matrix.service }}'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'


  # ÉTAPE 3 : BUILD & PUSH DOCKER IMAGES (sur push vers 'main')
  
  build-push-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [erp-service, crm-service, supply-chain-service, bi-service, api-gateway]

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t johannbrandon/${{ matrix.service }}:latest ./${{ matrix.service }}
          docker push johannbrandon/${{ matrix.service }}:latest


  # ÉTAPE 4 : DEPLOY PROD (sur push vers 'main')

  deploy-prod:
    name:  Deploy to PROD
    runs-on: ubuntu-latest
    needs: build-push-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Permet une validation manuelle sur GitHub
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Create S3 bucket for Terraform state (if not exists)
        run: |
          aws s3api head-bucket --bucket digitrans-terraform-state-johann 2>/dev/null || \
          aws s3api create-bucket \
            --bucket digitrans-terraform-state-johann \
            --region eu-west-3 \
            --create-bucket-configuration LocationConstraint=eu-west-3

      - name: Terraform Deploy PROD
        working-directory: ./infrastructure/terraform
        run: |
          terraform init
          terraform apply -var-file="prod.tfvars" -auto-approve
